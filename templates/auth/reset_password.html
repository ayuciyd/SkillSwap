{% extends "base.html" %}
{% block no_auth_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="navbar-brand brand-text" style="justify-content: center; display: flex; align-items: center; margin-bottom: 16px;"><img src="{{ url_for('static', filename='img/logo.png') }}" style="height: 48px; margin-right: 0px;" alt="Logo"> SkillSwap</div>
            <h1>Reset Password</h1>
            <p>Enter the OTP sent to {{ email }} and your new password.</p>
        </div>
        <form method="POST" action="{{ url_for('reset_password') }}">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="form-group" style="text-align: left;">
                <label class="form-label">6-Digit OTP</label>
                <input type="text" name="otp" class="form-control" required placeholder="123456" pattern="\d{6}" maxlength="6">
            </div>
            <div class="form-group" style="text-align: left;">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; padding: 12px;">Reset Password</button>
        </form>
        <p class="mt-6" style="color: var(--muted);"><a href="{{ url_for('login') }}">Back to Login</a></p>
    </div>
</div>
{% endblock %}
