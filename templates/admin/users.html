{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Manage Users</h1>
</div>
<div class="card">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID / Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Credits</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td>
                        <div style="font-weight: 600;">{{ u.full_name }}</div>
                        <div style="font-size: 0.75rem; color: var(--muted);">{{ u.id }}</div>
                    </td>
                    <td>{{ u.email }}</td>
                    <td><span class="badge {% if u.role == 'admin' %}badge-secondary{% else %}badge-primary{% endif %}">{{ u.role.upper() }}</span></td>
                    <td style="font-weight: bold; color: var(--success);">{{ u.credits_balance }}</td>
                    <td><span class="badge {% if u.is_active %}badge-success{% else %}badge-muted{% endif %}">{% if u.is_active %}Active{% else %}Inactive{% endif %}</span></td>
                    <td>
                        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                            <form method="POST" action="{{ url_for('admin_toggle_admin', id=u.id) }}">
                                <button class="btn btn-sm btn-outline">Toggle Role</button>
                            </form>
                            <form method="POST" action="{{ url_for('admin_grant_credits', id=u.id) }}" style="display:flex; gap: 4px;">
                                <input type="number" name="amount" placeholder="+/-" style="width: 60px; padding: 4px;" class="form-control">
                                <button class="btn btn-sm btn-primary">Adjsut</button>
                            </form>
                            <form method="POST" action="{{ url_for('admin_delete_user', id=u.id) }}" onsubmit="return confirm('WARNING: This will cascade delete their skills, matches, and sessions. Proceed?');">
                                <button class="btn btn-sm" style="background: red; color: white;">Delete</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
