{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Manage Skills</h1>
</div>
<div class="card">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Skill Name</th>
                    <th>User</th>
                    <th>Category</th>
                    <th>Type</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for s in skills %}
                <tr>
                    <td style="font-weight: 600;">{{ s.skill_name }}</td>
                    <td>{{ s.full_name }}</td>
                    <td>{{ s.category_name }}</td>
                    <td><span class="badge {% if s.skill_type == 'teach' %}badge-success{% else %}badge-warning{% endif %}">{{ s.skill_type.upper() }}</span></td>
                    <td>
                        <form method="POST" action="{{ url_for('admin_delete_skill', id=s.id) }}" onsubmit="return confirm('Delete this skill?');">
                            <button class="btn btn-sm btn-outline" style="color: red; border-color: red;">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
